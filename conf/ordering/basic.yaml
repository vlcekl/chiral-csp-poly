# Ordering gates and strategy selection
enabled: true
strategy: greedy
max_candidates: 64

# Greedy-only or greedy-dominant controls
max_site_sweeps: 5

# Ordering restraint and protocol controls
positional_k: 5000.0
freeze_backbone: true
soft_n_stages: 2
soft_max_iterations: 40
full_max_iterations: 80
final_restraint_factor: 0.15
skip_full_stage: ${seed_bias.skip_full_stage}

# Shared soft-stage bias and nonbonded controls
hbond_k: 0.0
soft_repulsion_k_kj_per_mol_nm2: ${seed_bias.soft_repulsion_k_kj_per_mol_nm2}
soft_repulsion_cutoff_nm: ${seed_bias.soft_repulsion_cutoff_nm}
anti_stacking_sigma_scale: ${seed_bias.anti_stacking_sigma_scale}
soft_exclude_14: ${seed_bias.soft_exclude_14}
ideal_hbond_target_nm: ${seed_bias.ideal_hbond_target_nm}
hbond_neighbor_window: ${seed_bias.hbond_neighbor_window}
hbond_pairing_mode: ${seed_bias.hbond_pairing_mode}
hbond_restraint_atom_mode: ${seed_bias.hbond_restraint_atom_mode}

# Soft selector H-bond bias
soft_selector_hbond_bias:
  enabled: ${seed_bias.soft_selector_hbond_bias.enabled}
  epsilon_kj_per_mol: ${seed_bias.soft_selector_hbond_bias.epsilon_kj_per_mol}
  r0_nm: ${seed_bias.soft_selector_hbond_bias.r0_nm}
  half_width_nm: ${seed_bias.soft_selector_hbond_bias.half_width_nm}
  hbond_neighbor_window: ${seed_bias.soft_selector_hbond_bias.hbond_neighbor_window}

# Ordering diagnostics
hbond_max_distance_A: 3.3
hbond_connectivity_policy: auto
hbond_min_donor_angle_deg: 100.0
hbond_min_acceptor_angle_deg: 90.0

# Symmetry-coupled-only controls
symmetry_maxiter: 60
symmetry_popsize: 12
symmetry_polish: false

# Symmetry-network-only controls
symmetry_network_min_heavy_distance_A: 1.7
symmetry_network_clash_penalty: 1000000.0
symmetry_network_weight_geom_occ: 100.0
symmetry_network_weight_like_occ: 20.0
symmetry_network_weight_geom_frac: 5.0
symmetry_network_weight_family_min_geom: 150.0
symmetry_network_weight_family_min_like: 40.0
symmetry_network_weight_soft_energy: 1.0
symmetry_network_weight_full_energy: 1.0
symmetry_network_energy_clip: 5.0
symmetry_network_rerank_population: true
symmetry_network_use_full_energy_in_search: true
symmetry_init_from_rotamer_grid: true
symmetry_init_jitter_deg: 10.0
