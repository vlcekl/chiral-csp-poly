# @package _global_
defaults:
  - /ordering/basic@ordering
  - _self_

ordering:
  strategy: symmetry_network
  skip_full_stage: false
  symmetry_network_min_heavy_distance_A: 1.7
  symmetry_network_clash_penalty: 1000000.0
  symmetry_network_weight_geom_occ: 100.0
  symmetry_network_weight_like_occ: 20.0
  symmetry_network_weight_geom_frac: 5.0
  symmetry_network_weight_family_min_geom: 150.0
  symmetry_network_weight_family_min_like: 40.0
  symmetry_network_weight_soft_energy: 1.0
  symmetry_network_weight_full_energy: 1.0
  symmetry_network_energy_clip: 5.0
  symmetry_network_rerank_population: true
  symmetry_network_use_full_energy_in_search: true
  symmetry_network_capture_enabled: true
  symmetry_network_capture_soft_repulsion_scale: 0.15
  symmetry_network_capture_min_heavy_distance_A: 1.25
  symmetry_network_capture_clash_penalty: 10000.0
  symmetry_network_capture_weight_geom_occ: 180.0
  symmetry_network_capture_weight_like_occ: 40.0
  symmetry_network_capture_weight_geom_frac: 12.0
  symmetry_network_capture_weight_family_min_geom: 260.0
  symmetry_network_capture_weight_family_min_like: 80.0
  symmetry_network_capture_weight_soft_energy: 0.10
  symmetry_network_capture_energy_clip: 3.0
  symmetry_network_cleanup_enabled: true
  symmetry_network_cleanup_maxiter: 24
  symmetry_network_cleanup_popsize: 8
  symmetry_network_cleanup_polish: false
  symmetry_network_cleanup_init_jitter_deg: 6.0
  symmetry_init_from_rotamer_grid: true
  symmetry_init_jitter_deg: 10.0
  symmetry_backbone_refine_enabled: true
  symmetry_backbone_reoptimize_selectors: true
  symmetry_backbone_include_c6_omega: true
  symmetry_backbone_include_phi: true
  symmetry_backbone_include_psi: true
  symmetry_backbone_maxiter: 20
  symmetry_backbone_popsize: 8
  symmetry_backbone_polish: false
  symmetry_backbone_init_jitter_deg: 8.0
