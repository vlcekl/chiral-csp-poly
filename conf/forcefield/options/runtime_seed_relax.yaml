# @package _global_
defaults:
  - /forcefield/options/runtime_relax@forcefield.options
  - override /seed_bias: solvent_ready
  - _self_

forcefield:
  options:
    # Relaxation restraint and protocol controls
    hbond_k: 0.0
    dihedral_l: 0.0

    # Anneal controls
    # Seed-mode soft finalization is intentionally incompatible with annealing.
    anneal:
      enabled: false
